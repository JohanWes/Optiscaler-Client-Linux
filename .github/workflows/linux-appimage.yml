name: linux-appimage

on:
  push:
    branches:
      - main
      - pre-release
    tags:
      - 'linux-v*'
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Run integration tests
        if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/pre-release'
        run: dotnet run --configuration Release --project tests/OptiscalerClient.IntegrationTests/OptiscalerClient.IntegrationTests.csproj

      - name: Publish linux-x64
        run: |
          dotnet publish \
            -c Release \
            -r linux-x64 \
            --self-contained true \
            -o artifacts/publish/linux-x64

      - name: Build AppImage
        run: |
          cd artifacts/publish/linux-x64
          
          app_root="$(mktemp -d)"
          mkdir -p "$app_root/data"
          mkdir -p "$app_root/opt/OptiscalerClient"
          mkdir -p "$app_root/usr/share/applications"
          mkdir -p "$app_root/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "$app_root/usr/share/metainfo"

          find . -mindepth 1 -maxdepth 1 -exec cp -a {} "$app_root/opt/OptiscalerClient/" \;

          cp "$GITHUB_WORKSPACE/packaging/linux/OptiscalerClient.desktop" "$app_root/usr/share/applications/"
          
          cp "$GITHUB_WORKSPACE/assets/icon.png" "$app_root/usr/share/icons/hicolor/256x256/apps/optiscalerclient.png"
          
          cat > "$app_root/usr/share/metainfo/com.optiscaler.client.appdata.xml" << 'APPDATA'
          <?xml version="1.0" encoding="UTF-8"?>
          <component type="desktop-application">
            <id>com.optiscaler.client</id>
            <name>OptiScaler Client</name>
            <summary>Manage FSR4 upscaling for games</summary>
            <metadata_license>MIT</metadata_license>
            <project_license>MIT</project_license>
            <description>
              <p>OptiScaler Client helps you install and manage FSR4 upscaling for Windows games running on Linux via Steam Proton or Heroic Games Launcher.</p>
            </description>
            <launchable type="desktop-id">OptiscalerClient.desktop</launchable>
            <url type="homepage">https://github.com/JohanWes/Optiscaler-Client-Linux</url>
          </component>
          APPDATA
          
          cat > OptiscalerClient-linux-x64.AppImage << 'BASH'
          #!/bin/bash
          set -euo pipefail

          ARCHIVE_LINE="$(awk '/^__ARCHIVE_BELOW__$/ { print NR + 1; exit 0; }' "$0")"
          TMPDIR="$(mktemp -d)"
          cleanup() {
            rm -rf "$TMPDIR"
          }
          trap cleanup EXIT

          tail -n +"$ARCHIVE_LINE" "$0" | tar -xzf - -C "$TMPDIR"
          APPDIR="$TMPDIR"
          export PATH="$APPDIR/usr/bin:$PATH"
          export LD_LIBRARY_PATH="$APPDIR/opt/OptiscalerClient${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export XDG_DATA_DIRS="$APPDIR/usr/share${XDG_DATA_DIRS:+:$XDG_DATA_DIRS}"
          exec "$APPDIR/opt/OptiscalerClient/OptiscalerClient" "$@"
          exit 0
          __ARCHIVE_BELOW__
          BASH
          tar -C "$app_root" -czf - . >> OptiscalerClient-linux-x64.AppImage
          chmod +x OptiscalerClient-linux-x64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: OptiscalerClient-AppImage
          path: artifacts/publish/linux-x64/OptiscalerClient-linux-x64.AppImage

      - name: Upload raw publish folder
        uses: actions/upload-artifact@v4
        with:
          name: OptiscalerClient-linux-x64-publish
          path: artifacts/publish/linux-x64

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/linux-v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Optiscaler Client Linux
          files: artifacts/publish/linux-x64/OptiscalerClient-linux-x64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
